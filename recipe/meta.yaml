{% set name = "pymaxspots" %}
{% set version = "1.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pymaxspots-{{ version }}.tar.gz
  sha256: 52b6bad32d268a34b3934ddf920d9a89c6d8b96f07738cc6042a7cf0c03d4d7f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numba
    - scipy

test:
  imports:
    - pymaxspots
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://code.usgs.gov/gmegsc/pymaxspots
  summary: Computing and connecting horizontal gradient maxima in potential-field geophysics
  license: CC0-1.0
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - collincr-usgs
