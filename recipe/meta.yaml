{% set name = "pymaxspots" %}
{% set version = "1.0.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pymaxspots-{{ version }}.tar.gz
  sha256: 96438f617d70da4e270da902c07315b7f2c0f2c13d7dabc371791a81af4932c3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numba
    - scipy

test:
  imports:
    - pymaxspots
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://code.usgs.gov/gmegsc/pymaxspots
  summary: Computing and connecting horizontal gradient maxima in potential-field geophysics
  license: CC0-1.0
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - collincr-usgs
